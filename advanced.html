<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BOSS海投助手 - 高级选项</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f4f8ff;
        color: #0f172a;
      }

      .page {
        min-height: 100vh;
        padding: 20px;
      }

      .panel {
        max-width: 720px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }

      .header {
        padding: 20px 22px 16px;
        border-bottom: 1px solid #e8eef8;
        background: linear-gradient(180deg, rgba(248, 251, 255, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
        color: #3774ee;
      }

      .header p {
        margin: 6px 0 0;
        font-size: 13px;
        color: #64748b;
      }

      .body {
        padding: 20px 22px 22px;
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 13px;
        color: #475569;
      }

      .field textarea,
      .field input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        background: #fff;
        color: #0f172a;
        outline: none;
        padding: 12px 14px;
        font: inherit;
      }

      .field input {
        height: 46px;
      }

      .field textarea {
        min-height: 120px;
        resize: vertical;
        line-height: 1.55;
      }

      .field textarea:focus,
      .field input:focus {
        border-color: #6da4ff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
      }

      .hint {
        font-size: 12px;
        color: #7a889d;
      }

      .toggles {
        display: grid;
        gap: 10px;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 12px;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: #f8fbff;
        font-size: 14px;
        color: #334155;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding-top: 6px;
      }

      .status {
        font-size: 12px;
        color: #64748b;
      }

      .button {
        height: 42px;
        border: 0;
        border-radius: 12px;
        padding: 0 16px;
        cursor: pointer;
        font: inherit;
      }

      .button.primary {
        background: linear-gradient(180deg, #4d8cff 0%, #2f6ae6 100%);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header class="header">
          <h1>BOSS海投助手</h1>
          <p>高级选项</p>
        </header>
        <section class="body">
          <div class="field">
            <label for="salaryKeywords">薪资包含（可选）</label>
            <input id="salaryKeywords" type="text" placeholder="20K, 25-35K" />
          </div>

          <div class="field">
            <label for="companyKeywords">公司名包含（可选）</label>
            <input id="companyKeywords" type="text" placeholder="字节, 腾讯, 外企" />
          </div>

          <div class="field">
            <label for="greetTemplate">打招呼语模板</label>
            <textarea id="greetTemplate" placeholder="支持 {jobTitle} {companyName} {location} {salary}"></textarea>
            <div class="hint">支持变量：{jobTitle} {companyName} {location} {salary}</div>
          </div>

          <div class="field">
            <label for="pollIntervalMs">轮询间隔(ms)</label>
            <input id="pollIntervalMs" type="number" min="600" step="100" />
          </div>

          <div class="toggles">
            <label class="toggle"><input id="autoGreet" type="checkbox" /> 自动打招呼</label>
            <label class="toggle"><input id="autoNext" type="checkbox" /> 自动切下一个</label>
          </div>

          <div class="footer">
            <div class="status" id="saveStatus">设置会自动保存</div>
            <button class="button primary" type="button" id="closeButton">关闭窗口</button>
          </div>
        </section>
      </section>
    </main>
    <script src="src/advanced.js"></script>
  </body>
</html>
